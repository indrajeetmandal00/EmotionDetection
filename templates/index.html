<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facial Emotion Detection Studio</title>
    <style>
        body {
            background-color: black;
            color: #0f0;
            font-family: monospace;
            text-align: center;
            padding-top: 20px;
        }

        #videoElement {
            display: none;
        }

        /* Hidden, only used to grab the stream */
        #outputImage {
            max-width: 100%;
            border: 1px solid #0f0;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <!-- Hidden video tag to capture the webcam -->
    <video id="videoElement" autoplay playsinline></video>
    <canvas id="canvasElement" style="display:none;"></canvas>

    <!-- The actual image shown to the user -->
    <img id="outputImage" src="" alt="Awaiting Video Feed... Please Allow Camera Access." />

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const context = canvas.getContext('2d');
        const outputImage = document.getElementById('outputImage');
        let isProcessing = false;

        // Request webcam access from the user's browser
        navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
            video.srcObject = stream;
            video.play();
            video.addEventListener('loadeddata', () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                requestAnimationFrame(sendFrame);
            });
        }).catch((err) => { alert("Please allow camera access!"); });

        function sendFrame() {
            if (isProcessing) return requestAnimationFrame(sendFrame);
            isProcessing = true;

            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataURL = canvas.toDataURL('image/jpeg', 0.6); // Compress slightly

            fetch('/process_frame', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataURL })
            }).then(res => res.json()).then(data => {
                if (data.image) outputImage.src = data.image;
                isProcessing = false;
                requestAnimationFrame(sendFrame);
            }).catch(err => {
                isProcessing = false;
                setTimeout(() => requestAnimationFrame(sendFrame), 500);
            });
        }
    </script>
</body>

</html>
